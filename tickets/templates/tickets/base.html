<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}WorkBuddy 2.0{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; }
        .navbar-brand { font-weight: 700; letter-spacing: 0.3px; font-size: 1.1rem; }
        .navbar-brand .app-version { font-weight: 300; opacity: 0.7; font-size: 0.8rem; }
        .table > :not(caption) > * > * { vertical-align: middle; }
        .subject-cell {
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .notes-col { min-width: 220px; }
        textarea.form-control { min-height: unset; }
        .priority-high { border-left: 3px solid #dc3545 !important; }
        .priority-medium { border-left: 3px solid #ffc107 !important; }
        .priority-low { border-left: 3px solid #adb5bd !important; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container-fluid">
            <span class="navbar-brand">
                <i class="bi bi-tools me-2"></i>WorkBuddy
                <span class="app-version ms-1">2.0</span>
            </span>
            <span class="navbar-text text-secondary small">Ticket Tracker</span>
        </div>
    </nav>

    <div class="container-fluid px-4">
        {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
